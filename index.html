<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlertHub</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#190df5">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eff2f3;
font-family:Arial, sans-serif;
}

.header{
text-align:center;
font-size:32px;
font-weight:bold;
margin-top:20px;
}

.card-box{
background:white;
border-radius:15px;
padding:20px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.btn-blue{
background:#190df5;
color:white;
}

.progress{
height:25px;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
🚨 AlertHub
</div>

<div class="card-box">

<h4 class="text-center mb-3">Alert Monitor</h4>

<p class="text-center">
Alerts: <span id="percent">0</span>% |
<span id="level">LOW</span>
</p>

<div class="progress">
<div id="progressBar" class="progress-bar bg-success" style="width:0%">0%</div>
</div>

<div class="text-center mt-3">

<select id="alertType" class="form-select w-50 mx-auto mb-3">
<option>Fire</option>
<option>Flood</option>
<option>Accident</option>
<option>Crime</option>
</select>

<button class="btn btn-blue me-2" onclick="reportAlert()">
➕ Report Alert
</button>

<button class="btn btn-secondary" onclick="resetData()">
🔁 Reset
</button>

</div>

</div>

<div class="card-box">

<h4 class="text-center">Alert Reports</h4>

<table class="table table-bordered text-center">
<thead class="table-primary">
<tr>
<th>Date</th>
<th>%</th>
<th>Alert</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

<div class="text-center">
<button class="btn btn-danger" onclick="clearAll()">Clear All</button>
</div>

</div>

</div>

<script>

let percent = 0;

window.onload = function(){
loadData();
};

function reportAlert(){

let alertType = document.getElementById("alertType").value;
let table = document.getElementById("reportTable");

percent += 10;
if(percent > 100) percent = 100;

updateLevel();

let row = table.insertRow();

let time = new Date().toLocaleString();

row.innerHTML = `
<td>${time}</td>
<td>${percent}%</td>
<td>${alertType}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>
</td>
`;

saveData();
}

function updateLevel(){

let level = "LOW";
let color = "bg-success";

if(percent >= 50){
level = "MEDIUM";
color = "bg-warning";
}

if(percent >= 80){
level = "HIGH";
color = "bg-danger";
}

document.getElementById("percent").innerText = percent;
document.getElementById("level").innerText = level;

let bar = document.getElementById("progressBar");
bar.style.width = percent + "%";
bar.innerText = percent + "%";
bar.className = "progress-bar " + color;
}

function deleteRow(btn){
btn.parentElement.parentElement.remove();
saveData();
}

function resetData(){

percent = 0;
updateLevel();

document.getElementById("reportTable").innerHTML = "";
saveData();
}

function clearAll(){

document.getElementById("reportTable").innerHTML = "";
percent = 0;
updateLevel();
saveData();
}

function saveData(){

localStorage.setItem("alertPercent", percent);
localStorage.setItem("alertTable", document.getElementById("reportTable").innerHTML);

}

function loadData(){

percent = parseInt(localStorage.getItem("alertPercent")) || 0;
document.getElementById("reportTable").innerHTML = localStorage.getItem("alertTable") || "";

updateLevel();

}

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
  .then(() => console.log("Service Worker Registered"));
}
</script>


</body>
</html>
